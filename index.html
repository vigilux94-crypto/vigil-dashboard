<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Vigil - Claims Management</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0b0e14; color: #fff; margin: 0; padding: 20px; }
        .dashboard-container { max-width: 1400px; margin: 0 auto; display: grid; grid-template-columns: 350px 1fr; gap: 20px; }
        .sidebar { background: #161b22; padding: 20px; border-radius: 16px; border: 1px solid #30363d; text-align: center; }
        .card { background: #161b22; padding: 15px; border-radius: 12px; border: 1px solid #30363d; height: 350px; overflow-y: auto; }
        .input-field { width: 90%; padding: 10px; margin-bottom: 10px; border-radius: 6px; border: 1px solid #30363d; background: #0d1117; color: white; }
        .btn { width: 100%; padding: 12px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; margin-top: 10px; color: white; }
        .btn-green { background: #238636; }
        .btn-blue { background: #0056b3; }
        .item { font-size: 11px; padding: 8px; border-bottom: 1px solid #21262d; }
    </style>
</head>
<body>
<div class="dashboard-container">
    <div class="sidebar">
        <h3 style="color: #58a6ff;">VIGIL CLAIMS</h3>
        <label style="font-size: 11px; color: #8b949e;">CLIENT NAME</label>
        <input type="text" id="client_name" class="input-field" placeholder="Enter Full Name">
        <label style="font-size: 11px; color: #8b949e;">TRIP DISTANCE (MILES)</label>
        <input type="number" id="miles" class="input-field" value="5">
        <button class="btn btn-green" onclick="logTrip()">Authorize & Log Trip</button>
        <hr style="border: 1px solid #30363d; margin: 20px 0;">
        <button class="btn btn-blue" onclick="window.open('http://localhost:8000/api/export-csv/')">📥 Generate Medicaid CSV</button>
    </div>
    <div class="main">
        <div class="card">
            <h4>💰 Claims History</h4>
            <div id="billing-list"></div>
        </div>
    </div>
</div>
<script>
    async function logTrip() {
        const name = document.getElementById('client_name').value;
        const miles = document.getElementById('miles').value;
        if(!name) { alert("Please enter a client name."); return; }
        await fetch(`http://localhost:8000/api/billing/?client_name=${name}&miles=${miles}`, {method:'POST'});
        loadHistory();
    }
    async function loadHistory() {
        const res = await fetch('http://localhost:8000/api/history/');
        const data = await res.json();
        document.getElementById('billing-list').innerHTML = data.billing.map(b => `<div class="item"><strong>${b.client}</strong> | ID: ${b.receipt} | ${b.timestamp} | ${b.miles} mi</div>`).join('');
    }
    loadHistory();
</script>
</body>
</html>
